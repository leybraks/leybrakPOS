version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Quitamos la exposición del puerto 5432 por seguridad. El backend lo verá internamente.
    restart: always
    networks:
      - leybrak_internal

  redis:
    image: redis:alpine
    restart: always
    networks:
      - leybrak_internal

  backend:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - EVO_GLOBAL_KEY=${EVOLUTION_API_KEY:-BravaSuperSecret2026}
    # Quitamos ports: - "8000:8000", NPM lo ruteará internamente
    depends_on:
      - db
      - redis
    restart: always
    networks:
      - leybrak_internal
      - nginx_network # Conectamos al proxy

  frontend:
    build: ./pos-frontend
    container_name: pos_frontend
    # QUITAMOS EL PUERTO 80:80 para no chocar con NPM
    depends_on:
      - backend
    restart: always
    networks:
      - leybrak_internal
      - nginx_network # Conectamos al proxy

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: brava_evolution_api
    restart: always
    # Quitamos ports: - "8080:8080" para que no quede expuesto al público sin pasar por Cloudflare
    environment:
      # ACTUALIZADO: Ahora apunta a tu nuevo dominio
      - SERVER_URL=https://api.leybrak.com
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-BravaSuperSecret2026}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=evolution
      - REDIS_URI=redis://redis:6379/1
      - REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_TTL=604800
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - CONFIG_SESSION_PHONE_CLIENT=LeybrakPOS # Actualizado a tu nueva marca
      - LOG_LEVEL=ERROR
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - redis
      - db
    networks:
      - leybrak_internal
      - nginx_network # Conectamos al proxy

volumes:
  postgres_data:
  evolution_instances:

networks:
  leybrak_internal:
    driver: bridge
  nginx_network:
    external: true # Esta es la red de NPM