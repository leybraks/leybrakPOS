version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:alpine
    restart: always

  backend:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    volumes:
      - .:/app
    env_file:
      - .env                          # ✅ Lee todo el .env automáticamente
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - EVO_GLOBAL_KEY=${EVOLUTION_API_KEY:-BravaSuperSecret2026}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build: ./pos-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  # ✨ LA NUEVA BESTIA: EVOLUTION API
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: brava_evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      # IMPORTANTE: Cambia 'localhost' por la IP de tu servidor Oracle (163.176.135.213)
      - SERVER_URL=http://163.176.135.213:8080 
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-BravaSuperSecret2026}
      
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=evolution
      # Conexión optimizada a tu Redis
      - REDIS_URI=redis://redis:6379/1
      - REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_TTL=604800
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      # Configuración de rendimiento
      - CONFIG_SESSION_PHONE_CLIENT=BravaPOS
      - LOG_LEVEL=ERROR
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - redis
      - db

volumes:
  postgres_data:
  evolution_instances: # ✅ Creamos el volumen para guardar las sesiones de WhatsApp