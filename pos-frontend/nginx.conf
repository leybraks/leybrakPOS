server {
    listen 80;
    server_name pos.leybrak.com; 

    # 1. FRONTEND (React)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # ✨ LA MAGIA: Redirige todo lo que no encuentre al index.html
        try_files $uri $uri/ /index.html; 
    }

    # 2. BACKEND (Django API) - Apuntando a tu contenedor real
    location /api/ {
        proxy_pass http://leybrakpos-backend-1:8000; 
        
        # Estas cabeceras le dicen a Django quién es el usuario real que se conecta
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. BACKEND (Django Admin - Opcional pero necesario para que gestiones la BD)
    location /admin/ {
        proxy_pass http://leybrakpos-backend-1:8000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. WEBSOCKETS (Para tus actualizaciones en tiempo real)
    location /ws/ {
        proxy_pass http://leybrakpos-backend-1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}